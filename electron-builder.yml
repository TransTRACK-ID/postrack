appId: id.transtrack.postrack
productName: Postrack
icon: build/icons/icon.png
directories:
  output: release
publish:
  provider: github
  owner: TransTRACK-ID
  repo: postrack
files:
  - dist-electron/**/*
  - package.json
extraResources:
  - from: .env
    to: .env
    filter: ["**/*"]
  - from: .output
    to: .output
    filter: ["**/*"]
  - from: drizzle
    to: drizzle
    filter: ["**/*"]
  - from: node_modules
    to: node_modules
    filter:
      - "pg/**"
      - "drizzle-orm/**"
      - "jsonwebtoken/**"
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  # Unsigned internal distribution. electron-builder auto-discovers any
  # signing identity on the machine; setting this to null disables signing
  # so builds can be shared without an Apple Developer certificate.
  # Set CSC_LINK / CSC_KEY_PASSWORD (and an afterSign notarize hook) to sign.
  identity: null
