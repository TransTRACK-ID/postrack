appId: id.transtrack.postrack
productName: Postrack
icon: build/icons/icon.png
directories:
  output: release
publish:
  provider: github
  owner: TransTRACK-ID
  repo: postrack
files:
  - dist-electron/**/*
  - package.json
extraResources:
  - from: .env
    to: .env
    filter: ["**/*"]
  - from: .output
    to: .output
    filter: ["**/*"]
  - from: drizzle
    to: drizzle
    filter: ["**/*"]
  - from: node_modules
    to: node_modules
    filter:
      - "pg/**"
      - "drizzle-orm/**"
      - "jsonwebtoken/**"
  - from: build/icons/icon.png
    to: icon.png
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: null
